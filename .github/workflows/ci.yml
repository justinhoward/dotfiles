---
name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: ['**']
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1071

  shellcheck-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install chezmoi
        run: sudo snap install chezmoi --classic
      - name: Lint entry files and rendered templates
        run: bash .github/scripts/lint-templates.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: yamllint --strict -c .yamllint.yml .

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint --config home/dot_markdownlintrc '**/*.md'
