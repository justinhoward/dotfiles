# Applied automatically when the OS reports dark mode. kitty watches for
# dark/light/no-preference *-theme.auto.conf files and swaps colors live when
# the system appearance changes (see the themes kitten "auto_color_scheme"
# docs). Colors here override everything else in kitty.conf.
#
# Dark = Sonokai, matching nvim's dark colorscheme (see nvim colorscheme.lua).
include themes/sonokai.conf
